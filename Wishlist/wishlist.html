<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist | GreenNest Nursery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Nunito', sans-serif; }
    h1, h2, h3 { font-family: 'Playfair Display', serif; }
    
    :root {
      --green-dark:   #2d6a4f;
      --green-mid:    #40916c;
      --green-light:  #74c69d;
      --green-pale:   #d8f3dc;
      --green-accent: #52b788;
      --earth:        #a07850;
      --earth-light:  #f0e0c8;
      --cream:        #f9f6f0;
      --white:        #ffffff;
      --text-dark:    #1b3a2d;
      --text-mid:     #3a5a44;
    }
    
    body { 
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    main { flex: 1; }
    
    .product-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #e8f5e9;
      background: white;
      border-radius: 1rem;
      overflow: hidden;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 32px rgba(45,106,79,0.12);
      border-color: #b7e4c7;
    }
    
    .empty-state { min-height: 60vh; }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fade-in {
      animation: fadeIn 0.4s ease-out forwards;
    }
    
    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    .heart-beat {
      animation: heartBeat 0.3s ease;
    }
    
    .toast-notification {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      min-width: 280px;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    
    .discount-badge {
      background: linear-gradient(135deg, #c0392b, #e74c3c);
    }
    
    .btn-cart {
      background: linear-gradient(135deg, #1b3a2d, #2d6a4f);
      transition: all 0.3s ease;
    }
    .btn-cart:hover {
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      transform: translateY(-1px);
    }
    
    @media (max-width: 1024px) {
      #footer-placeholder { display: none !important; }
    }
  </style>
</head>
<body>
  <!-- Header Placeholder - loads exactly like home page -->
  <div id="header-placeholder"></div>
  
  <main class="max-w-7xl mx-auto px-4 py-8 mt-40">
    <h1 class="text-2xl font-bold text-gray-800 mb-8 text-center">
      <i class="fas fa-heart text-red-500 mr-3"></i> My Wishlist
      <span id="wishlist-count-badge" class="ml-2 text-sm bg-red-500 text-white rounded-full px-2 py-0.5 align-middle"></span>
    </h1>

    <button id="clear-wishlist-btn" 
            onclick="clearWishlist()" 
            class="hidden bg-red-600 hover:bg-red-700 text-white font-medium py-2 px-6 rounded-lg transition shadow-md mb-5">
      <i class="fas fa-trash mr-2"></i> Clear Wishlist
    </button>

    <!-- Wishlist Items Container -->
    <div id="wishlist-items" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
      <!-- Items injected by wishlist.js -->
    </div>

    <!-- Loading State -->
    <div id="loading-state" class="text-center py-10">
      <i class="fas fa-spinner fa-spin text-4xl text-gray-400"></i>
      <p class="mt-4 text-gray-600">Loading your wishlist...</p>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state flex flex-col items-center justify-center text-center hidden">
      <i class="fas fa-heart-broken text-8xl text-gray-300 mb-6"></i>
      <h2 class="text-2xl font-bold text-gray-600 mb-3">Your wishlist is empty</h2>
      <p class="text-gray-500 mb-8">Add products you love and they'll appear here!</p>
      <a href="../home.html" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-12 rounded-xl transition">
        Continue Shopping 🌿
      </a>
    </div>
  </main>

  <!-- Footer Placeholder - loads exactly like home page -->
  <div id="footer-placeholder"></div>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Load Header & Footer (exactly like home.html) -->
  <script>
    function loadHeader() {
      fetch('../Header/header.html')
        .then(r => { if (!r.ok) throw new Error('Header not found'); return r.text(); })
        .then(html => {
          document.getElementById('header-placeholder').innerHTML = html;
          const script = document.createElement('script');
          script.src = '../Header/header.js';
          document.body.appendChild(script);
        })
        .catch(e => console.error('Header load error:', e));
    }
    function loadFooter() {
      fetch('../Footer/footer.html')
        .then(r => { if (!r.ok) throw new Error('Footer not found'); return r.text(); })
        .then(html => {
          document.getElementById('footer-placeholder').innerHTML = html;
        })
        .catch(e => console.error('Footer load error:', e));
    }
    document.addEventListener('DOMContentLoaded', () => {
      loadHeader();
      loadFooter();
    });
  </script>

  <!-- Main Wishlist Script -->
  <script src="wishlist.js"></script>
</body>
</html>
